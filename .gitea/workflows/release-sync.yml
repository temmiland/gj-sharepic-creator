name: Sync Release to GitHub

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/temmiland/gj-sharepic-creator/releases \
            -d '{
              "tag_name": "${{ gitea.event.release.tag_name }}",
              "name": "${{ gitea.event.release.name }}",
              "body": "${{ gitea.event.release.body }}",
              "prerelease": ${{ gitea.event.release.prerelease }}
            }'